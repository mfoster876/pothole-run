<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1a12" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pothole Run</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <!-- Picker for the player's own driving soundtracks (files stay local). It is
       visually hidden but MUST stay rendered (not display:none): iOS Safari refuses to
       open a display:none file input via a programmatic .click(), which silently broke
       the upload. Off-screen + 1px + opacity:0 keeps it invisible yet clickable. -->
  <input type="file" id="music-upload" accept="audio/*" multiple
         style="position:fixed;left:0;bottom:0;width:1px;height:1px;opacity:0;border:0;padding:0;" />
  <script type="module" src="src/main.js"></script>
</body>
</html>
